<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VODs - Jellych</title>
  <link rel="icon" href="/html/assets/img/twitch_jellyfish_icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/html/assets/app.css" />
</head>
<body class="min-h-screen bg-[#111] text-[#eee] font-sans">
  <div class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-4 sm:px-6">
    <header class="flex flex-wrap items-center justify-between gap-3 border-b border-white/10 pb-4">
      <a href="/" class="flex items-center gap-2 text-white no-underline">
        <img src="/html/assets/img/twitch_jellyfish_icon.svg" alt="Jellyfish icon" class="h-11 w-11 rounded-md" />
        <div>
          <div class="text-lg font-bold leading-tight">Jellych</div>
          <div class="text-xs text-white/50">VOD library</div>
        </div>
      </a>
      <nav class="flex items-center gap-2 text-sm">
        <a href="/watch" class="rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-white/80 no-underline transition-colors hover:border-[#4aa3ff] hover:text-white">Live</a>
        <a href="/api/vods.m3u" class="rounded-md border border-white/10 bg-white/5 px-3 py-1.5 text-white/80 no-underline transition-colors hover:border-[#4aa3ff] hover:text-white">M3U</a>
      </nav>
    </header>

    <main class="grid min-w-0 flex-1 gap-4 py-4 lg:grid-cols-[360px_minmax(0,1fr)]">
      <section class="min-w-0 rounded-lg border border-[#333] bg-[#1a1a1b] p-4">
        <h1 class="mb-4 text-base font-bold">Add VOD</h1>
        <form id="vodForm" class="flex flex-col gap-3">
          <label class="flex flex-col gap-1.5 text-sm text-white/75">
            VOD ID
            <input id="vodId" class="field" type="text" inputmode="numeric" minlength="10" maxlength="10" pattern="[0-9]{10}" placeholder="1234567890" required />
          </label>
          <button id="addVodBtn" class="button" type="submit">Add VOD</button>
          <div id="vodMsg" class="min-h-[20px] text-sm text-white/50"></div>
        </form>
        <div class="mt-5 border-t border-white/10 pt-4">
          <h2 class="mb-3 text-sm font-bold">Download Settings</h2>
          <label class="flex flex-col gap-1.5 text-sm text-white/75">
            Compression preset
            <select id="downloadPreset" class="field">
              <option value="original">Original</option>
              <option value="h264">H.264</option>
              <option value="hevc">HEVC</option>
              <option value="vp9">VP9</option>
            </select>
            <code id="downloadPresetCommand" class="mt-1 block overflow-x-auto rounded border border-white/10 bg-black/35 px-3 py-2 text-xs leading-relaxed text-white/60"></code>
          </label>
        </div>
      </section>

      <section class="min-w-0 rounded-lg border border-[#222] bg-[#0f0f10] p-4">
        <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
          <h2 class="text-base font-bold">Saved VODs</h2>
          <div class="flex flex-wrap items-center gap-2">
            <select id="vodChannelFilter" class="field w-auto max-w-[180px] py-1.5 text-xs" aria-label="Filter VODs by channel">
              <option value="all">All channels</option>
            </select>
            <select id="vodFilter" class="field w-auto py-1.5 text-xs" aria-label="Filter VODs">
              <option value="all">All VODs</option>
              <option value="downloaded">Downloaded only</option>
            </select>
          </div>
        </div>
        <div id="vodList" class="flex min-w-0 flex-col gap-2">Loading VODs...</div>
        <nav id="vodPagination" class="mt-4 hidden items-center justify-between gap-3 border-t border-white/10 pt-3" aria-label="VOD pages">
          <button id="vodPreviousPage" class="button py-1.5" type="button">Previous</button>
          <span id="vodPageStatus" class="text-xs text-white/55" aria-live="polite"></span>
          <button id="vodNextPage" class="button py-1.5" type="button">Next</button>
        </nav>
      </section>
    </main>
  </div>

  <script type="module" src="/html/js/vods.js"></script>
</body>
</html>
